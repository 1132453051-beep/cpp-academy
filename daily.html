<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>每日一题 · 真·编译器</title>
<style>
body { font-family: sans-serif; background:#f4f6f8; padding:20px; }
textarea { width:100%; height:180px; font-family: monospace; }
button { padding:10px 16px; margin-top:10px; }
pre { background:#1e1e1e; color:#fff; padding:12px; border-radius:8px; }
</style>
</head>

<body>

<h1>🎲 每日一题（真·C++ 编译器）</h1>

<textarea id="code">
#include <iostream>
using namespace std;

int main() {
    int a, b;
    cin >> a >> b;
    cout << a + b;
    return 0;
}
</textarea>

<br>
<button onclick="compile()">🚀 运行</button>

<h3>📤 输出</h3>
<pre id="out">等待运行...</pre>

<script src="assets/compiler.js"></script>
<script>
let Module = {
    print: text => document.getElementById("out").innerText += text + "\n",
    onRuntimeInitialized() {
        console.log("✅ C++ 编译器就绪");
    }
};

function compile() {
    const code = document.getElementById("code").value;
    document.getElementById("out").innerText = "";
    Module.ccall("run_code", null, ["string"], [code]);
}
</script>

</body>
</html>
