<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>每日一题 · 编程鸭</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.card { background:#fff; border-radius:16px; padding:24px; margin-bottom:20px; box-shadow:0 8px 30px rgba(0,0,0,.06); }
.badge { display:inline-block; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:bold; margin-bottom:10px; }
.badge.easy { background:#e8f5e9; color:#2e7d32; }
.badge.medium { background:#fff3e0; color:#ef6c00; }
.badge.hard { background:#ffebee; color:#c62828; }
textarea { width:100%; height:160px; font-family:monospace; padding:12px; border-radius:10px; border:1px solid #ddd; }
pre { background:#1e1e1e; color:#fff; padding:12px; border-radius:10px; }
select, button { padding:10px; border-radius:8px; border:1px solid #ccc; }
.result { margin-top:16px; padding:12px; border-radius:10px; font-weight:bold; }
</style>
</head>

<body>

<header>
    <h1>🎲 每日一题</h1>
    <a href="index.html">← 返回首页</a>
</header>

<main class="container">

<!-- 控制区 -->
<div class="card">
    <label>选择难度：</label>
    <select id="level">
        <option value="1">🟢 入门</option>
        <option value="2">🟡 普及</option>
        <option value="3">🔴 提高</option>
    </select>
    <button onclick="loadProblem()">🔄 换一题</button>
</div>

<!-- 题目 -->
<div class="card">
    <div id="difficulty"></div>
    <h2 id="title"></h2>
    <p id="desc"></p>
    <pre id="sample"></pre>
</div>

<!-- 代码 -->
<div class="card">
    <h3>🧠 编写代码</h3>
    <textarea id="code">
#include <iostream>
using namespace std;

int main() {
    int a, b;
    cin >> a >> b;
    cout << a + b;
    return 0;
}
    </textarea>
    <button onclick="submit()">🚀 提交判题</button>
    <div id="result"></div>
</div>

</main>

<script>
/* ===== 题库 ===== */
const problems = [
{
    id: 1,
    title: "A + B",
    difficulty: 1,
    desc: "输入两个整数，输出它们的和。",
    time: 1000,
    mem: 256,
    cases: [{in:"1 2",out:"3"},{in:"10 20",out:"30"}]
},
{
    id: 2,
    title: "减法",
    difficulty: 1,
    desc: "输入两个整数，输出它们的差。",
    time: 1000,
    mem: 256,
    cases: [{in:"5 3",out:"2"}]
},
{
    id: 3,
    title: "大整数加法",
    difficulty: 2,
    desc: "输入两个不超过 100 位的大整数，输出它们的和。",
    time: 1500,
    mem: 512,
    cases: [{in:"99999999999999999999999999999999999999 1",out:"100000000000000000000000000000000000000"}]
}
];

/* ===== 加载题目 ===== */
let cur;
function loadProblem() {
    const level = +level.value;
    const pool = problems.filter(p => p.difficulty === level);
    cur = pool[Math.floor(Math.random() * pool.length)];

    difficulty.innerHTML = `<span class="badge ${["easy","medium","hard"][cur.difficulty-1]}">${["🟢 入门","🟡 普及","🔴 提高"][cur.difficulty-1]}</span>`;
    title.innerText = cur.title;
    desc.innerText = cur.desc;
    sample.innerText = `输入：\n${cur.cases[0].in}\n\n输出：\n${cur.cases[0].out}`;
    result.innerText = "";
}
loadProblem();

/* ===== 判题 ===== */
function submit() {
    const start = performance.now();
    let status = "AC";

    // 时间限制
    const ok = runWithTimeLimit(() => {
        for (let c of cur.cases) {
            if (!simulateRun(code.value, c.in).includes(c.out)) {
                status = "WA";
            }
        }
    }, cur.time);

    if (!ok) status = "TLE";
    if (!checkMemory(cur.mem)) status = "MLE";

    result.className = "result";
    if (status === "AC") {
        result.style.background = "#e8f5e9";
        result.style.color = "#2e7d32";
        result.innerHTML = "✅ 通过！🦆 鸭鸭为你骄傲！";
        addWrong(false);
    } else {
        result.style.background = "#ffebee";
        result.style.color = "#c62828";
        result.innerText = "❌ " + ({
            WA: "答案错误",
            TLE: "时间超限（超过 " + cur.time + "ms）",
            MLE: "内存超限（超过 " + cur.mem + "MB）"
        })[status];
        addWrong(true);
    }
}

/* ===== 模拟执行 ===== */
function simulateRun(code, input) {
    return code.includes(input.split(" ")[0]) ? cur.cases[0].out : "error";
}
function runWithTimeLimit(fn, limit) {
    const s = performance.now();
    fn();
    return performance.now() - s <= limit;
}
function checkMemory(limit) {
    return !performance.memory || performance.memory.usedJSHeapSize / 1024 / 1024 < limit;
}

/* ===== 错题本 ===== */
function addWrong(fail) {
    if (!fail) return;
    let wrong = JSON.parse(localStorage.getItem("wrong") || "[]");
    if (!wrong.find(x => x.id === cur.id)) {
        wrong.push({ id: cur.id, title: cur.title, time: Date.now() });
        localStorage.setItem("wrong", JSON.stringify(wrong));
    }
}
</script>

</body>
</html>
